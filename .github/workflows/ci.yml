# Build and smoke-test both tiers on every push / PR.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        run: |
          npm ci
          npm run build

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Import app
        run: python -c "from main import app; assert app.title"
      - name: API smoke test
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from main import app
          c = TestClient(app)
          assert c.get('/').status_code == 200
          r = c.post('/match-jobs', json={
            'resume_text': 'python developer',
            'user_skills': ['python'],
            'jobs': [{'id': 'j1', 'description': 'python engineer', 'required_skills': ['python']}]
          })
          assert r.status_code == 200
          assert r.json()[0]['job_id'] == 'j1'
          print('ok')
          "
