services:
  # Python Backend (FastAPI)
  - type: web
    name: career-intel-ai
    runtime: python
    rootDir: backend
    buildCommand: python -m pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Set to your static site URL(s), comma-separated (see backend/.env.example)
      - key: ALLOWED_ORIGINS
        sync: false

  # React Frontend (Static Site)
  - type: web
    name: career-intel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
